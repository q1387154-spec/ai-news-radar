<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>物流快递政策情报雷达｜中通吉</title>
    <meta
      name="description"
      content="帮中通吉团队每天扫一遍物流/快递相关政策申报信息：高企认定、职业技能补贴、稳岗返还、无人配送、低空经济、数字化转型。数据来源：青浦/长三角/上海/国家三级穿透，自动更新。"
    />
    <meta property="og:title" content="物流快递政策情报雷达｜中通吉" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="物流快递政策情报雷达" />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <!-- Policy Radar: /policy.html -->
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-main">
          <div class="hero-headline">
            <img class="hero-logo" src="./assets/logo.svg" alt="Logo" />
            <div>
              <p class="hero-tag">物流政策情报</p>
              <h1>24 小时政策申报雷达</h1>
            </div>
          </div>
          <p class="hero-sub">
            青浦/长三角 → 上海市 → 国家，三级穿透。专注：高企认定、职业技能补贴、稳岗返还、无人配送、低空经济、数字化转型。
          </p>
        </div>
        <div class="hero-meta">
          <span class="updated-label">更新时间</span>
          <span class="updated" id="updatedAt">加载中...</span>
        </div>

        <section class="stats" id="stats"></section>

        <div class="declaration-banner" id="declarationBanner">
          <span class="banner-icon">🔔</span>
          <span class="banner-text" id="bannerText">申报窗口期加载中...</span>
        </div>

        <div class="category-tabs" id="categoryTabs">
          <button class="cat-tab active" data-category="all">全部</button>
          <button class="cat-tab" data-category="policy">🏛 政策申报</button>
          <button class="cat-tab" data-category="logistics">🚚 物流科技</button>
          <button class="cat-tab" data-category="ai">🤖 AI技术</button>
          <button class="cat-tab" data-category="job">💼 招聘求职</button>
          <button class="cat-tab" data-category="tax">💰 财税补贴</button>
          <button class="cat-tab" data-category="compliance">📋 监管合规</button>
        </div>

        <div class="region-filter" id="regionFilter">
          <button class="region-btn active" data-region="all">全部地域</button>
          <button class="region-btn" data-region="qingpu">🏛 青浦</button>
          <button class="region-btn" data-region="yrd">🌐 长三角</button>
          <button class="region-btn" data-region="shanghai">📍 上海</button>
          <button class="region-btn" data-region="national">🇨🇳 国家</button>
        </div>
      </header>

      <section class="primary-controls">
        <input id="searchInput" type="search" placeholder="搜索政策/补贴/申报关键词" />
        <div class="mode-hint" id="modeHint">AI强相关</div>
      </section>

      <details class="advanced-panel">
        <summary>
          <span>高级筛选与源状态</span>
          <span class="advanced-summary" id="advancedSummary">加载中...</span>
        </summary>
        <div class="advanced-content">
          <div class="advanced-controls">
            <label class="field">
              <span>站点</span>
              <select id="siteSelect">
                <option value="">全部站点</option>
              </select>
            </label>
            <div class="field">
              <span>视图</span>
              <div class="mode-switch">
                <button id="modeAiBtn" class="mode-btn active" type="button">AI强相关</button>
                <button id="modeAllBtn" class="mode-btn" type="button">全量</button>
              </div>
            </div>
            <label id="allDedupeWrap" class="all-dedupe" for="allDedupeToggle">
              <input id="allDedupeToggle" type="checkbox" checked />
              <span class="all-dedupe-dot"></span>
              <span id="allDedupeLabel">去重开</span>
            </label>
          </div>
          <div class="source-health" id="sourceHealth">源状态加载中...</div>
          <section class="site-pills" id="sitePills"></section>
        </div>
      </details>

      <section class="list-wrap">
        <div class="list-head">
          <h2 id="listTitle">政策信号流</h2>
          <span id="resultCount">0 条</span>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>
    </main>

    <template id="itemTpl">
      <article class="news-card">
        <div class="meta-row">
          <span class="site"></span>
          <span class="category"></span>
          <span class="source"></span>
          <time class="time"></time>
        </div>
        <a class="title" target="_blank" rel="noopener noreferrer"></a>
      </article>
    </template>

    <script src="./assets/app.js" defer></script>
  </body>
</html>
