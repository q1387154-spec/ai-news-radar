<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>政策机会雷达｜Policy OS</title>
  <meta name="description" content="中通吉政策申报决策系统 - 智能匹配企业画像，自动评分过滤风险" />
  <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --card-border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --level-s: #ef4444;
      --level-a: #f59e0b;
      --level-b: #3b82f6;
      --level-c: #64748b;
      --risk-low: #22c55e;
      --risk-med: #f59e0b;
      --risk-high: #ef4444;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    header {
      padding: 30px 0;
      border-bottom: 1px solid var(--card-border);
      margin-bottom: 30px;
    }
    
    .hero {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .hero-logo {
      width: 48px;
      height: 48px;
    }
    
    .hero h1 {
      font-size: 28px;
      font-weight: 700;
    }
    
    .hero .tag {
      font-size: 14px;
      color: var(--accent);
      background: rgba(59, 130, 246, 0.15);
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 8px;
    }
    
    .meta {
      font-size: 14px;
      color: var(--text-muted);
    }
    
    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }
    
    .stat-card .label {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .filter-btn:hover {
      border-color: var(--accent);
    }
    
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    .search-box {
      flex: 1;
      min-width: 250px;
    }
    
    .search-box input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .search-box input::placeholder {
      color: var(--text-muted);
    }
    
    /* Opportunity Cards */
    .opportunity-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .opp-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 24px;
      transition: transform 0.2s, border-color 0.2s;
    }
    
    .opp-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    
    .opp-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    
    .opp-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      display: block;
      margin-bottom: 8px;
    }
    
    .opp-title:hover {
      color: var(--accent);
    }
    
    .opp-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    
    .badge-level {
      color: white;
    }
    
    .badge-level.s { background: var(--level-s); }
    .badge-level.a { background: var(--level-a); }
    .badge-level.b { background: var(--level-b); }
    .badge-level.c { background: var(--level-c); }
    
    .badge-priority {
      background: rgba(59, 130, 246, 0.2);
      color: var(--accent);
    }
    
    .badge-subsidy {
      background: rgba(34, 197, 94, 0.2);
      color: var(--risk-low);
    }
    
    .badge-risk {
      background: rgba(34, 197, 94, 0.2);
      color: var(--risk-low);
    }
    
    .badge-risk.med {
      background: rgba(245, 158, 11, 0.2);
      color: var(--risk-med);
    }
    
    .badge-risk.high {
      background: rgba(239, 68, 68, 0.2);
      color: var(--risk-high);
    }
    
    .opp-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .meta-item {
      display: flex;
      flex-direction: column;
    }
    
    .meta-item .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    
    .meta-item .value {
      font-size: 14px;
      font-weight: 500;
    }
    
    .opp-details {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .detail-row:last-child {
      margin-bottom: 0;
    }
    
    .detail-label {
      color: var(--text-muted);
      min-width: 70px;
    }
    
    .detail-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .tag-item {
      font-size: 12px;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
    }
    
    .tag-missing {
      background: rgba(239, 68, 68, 0.15);
      color: var(--level-s);
    }
    
    .opp-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
    }
    
    .project-name {
      font-size: 14px;
      color: var(--text);
    }
    
    .project-name strong {
      color: var(--accent);
    }
    
    .score-display {
      font-size: 24px;
      font-weight: 700;
    }
    
    .score-display.s { color: var(--level-s); }
    .score-display.a { color: var(--level-a); }
    .score-display.b { color: var(--level-b); }
    .score-display.c { color: var(--level-c); }
    
    .score-display small {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 4px;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .opp-header {
        flex-direction: column;
      }
      
      .opp-meta {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="hero">
        <svg class="hero-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" stroke="#3b82f6" stroke-width="4" fill="none"/>
          <circle cx="50" cy="50" r="30" stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6"/>
          <circle cx="50" cy="50" r="15" fill="#3b82f6"/>
          <line x1="50" y1="5" x2="50" y2="20" stroke="#3b82f6" stroke-width="2"/>
          <line x1="50" y1="80" x2="50" y2="95" stroke="#3b82f6" stroke-width="2"/>
          <line x1="5" y1="50" x2="20" y2="50" stroke="#3b82f6" stroke-width="2"/>
          <line x1="80" y1="50" x2="95" y2="50" stroke="#3b82f6" stroke-width="2"/>
        </svg>
        <div>
          <div class="tag">Policy OS</div>
          <h1>政策机会雷达</h1>
        </div>
      </div>
      <div class="meta">
        <span id="updatedAt">加载中...</span> · 
        <span>企业画像: 上海中通吉网络技术有限公司</span>
      </div>
    </header>
    
    <section class="stats" id="stats"></section>
    
    <section class="filters">
      <div class="search-box">
        <input type="search" id="searchInput" placeholder="搜索政策名称、支持方向..." />
      </div>
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="S">🔥 S级</button>
      <button class="filter-btn" data-filter="A">⭐ A级</button>
      <button class="filter-btn" data-filter="B">📋 B级</button>
      <button class="filter-btn" data-filter="high-risk">⚠️ 高风险</button>
    </section>
    
    <main class="opportunity-list" id="opportunityList">
      <div class="loading">加载政策机会中...</div>
    </main>
  </div>
  
  <script>
    const DATA_URL = './data/policy-opportunities.json';
    
    const state = {
      opportunities: [],
      filter: 'all',
      search: ''
    };
    
    async function loadData() {
      try {
        const resp = await fetch(DATA_URL + '?t=' + Date.now());
        if (!resp.ok) throw new Error('Failed to load');
        const data = await resp.json();
        state.opportunities = data.opportunities || [];
        renderStats(data);
        render();
      } catch (e) {
        document.getElementById('opportunityList').innerHTML = `
          <div class="empty-state">
            <div class="icon">📡</div>
            <p>暂无可用政策数据</p>
            <p style="font-size:12px;margin-top:8px;">请先运行: python scripts/run_demo.py</p>
          </div>
        `;
      }
    }
    
    function renderStats(data) {
      const stats = document.getElementById('stats');
      const byLevel = data.by_level || {};
      const highPri = data.high_priority || 0;
      
      stats.innerHTML = `
        <div class="stat-card">
          <div class="value">${data.total || 0}</div>
          <div class="label">政策机会</div>
        </div>
        <div class="stat-card">
          <div class="value">${highPri}</div>
          <div class="label">高优先级</div>
        </div>
        <div class="stat-card">
          <div class="value">${byLevel.S || 0}</div>
          <div class="label">S级推荐</div>
        </div>
        <div class="stat-card">
          <div class="value">${byLevel.A || 0}</div>
          <div class="label">A级建议</div>
        </div>
        <div class="stat-card">
          <div class="value">${(data.generated_at || '').slice(0, 16).replace('T', ' ')}</div>
          <div class="label">更新时间</div>
        </div>
      `;
      
      const updatedAt = document.getElementById('updatedAt');
      if (data.generated_at) {
        const d = new Date(data.generated_at);
        updatedAt.textContent = d.toLocaleString('zh-CN');
      }
    }
    
    function render() {
      const list = document.getElementById('opportunityList');
      let filtered = state.opportunities;
      
      // Apply level filter
      if (state.filter === 'S') {
        filtered = filtered.filter(o => o.level === 'S');
      } else if (state.filter === 'A') {
        filtered = filtered.filter(o => o.level === 'A');
      } else if (state.filter === 'B') {
        filtered = filtered.filter(o => o.level === 'B');
      } else if (state.filter === 'high-risk') {
        filtered = filtered.filter(o => o.risk_level === '高' || o.risk_level === '中');
      }
      
      // Apply search
      if (state.search) {
        const q = state.search.toLowerCase();
        filtered = filtered.filter(o => 
          o.title.toLowerCase().includes(q) ||
          (o.parsed?.支持方向 || []).some(d => d.toLowerCase().includes(q)) ||
          o.source.toLowerCase().includes(q)
        );
      }
      
      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <p>没有找到匹配的政策</p>
          </div>
        `;
        return;
      }
      
      list.innerHTML = filtered.map(o => renderOppCard(o)).join('');
    }
    
    function renderOppCard(o) {
      const level = o.level || 'C';
      const risk = o.risk_level || '低';
      const isPre = o.is_pre_subsidy;
      const daysLeft = o.days_left || 0;
      const subsidy = o.roi?.subsidy || 0;
      const roi = o.roi?.roi_label || '?';
      const matched = o.matched_tags || [];
      const missing = o.missing_tags || [];
      const directions = o.parsed?.支持方向 || [];
      
      return `
        <article class="opp-card">
          <div class="opp-header">
            <div>
              <a href="${o.url || '#'}" class="opp-title" target="_blank">${o.title}</a>
              <div class="opp-badges">
                <span class="badge badge-level ${level.toLowerCase()}">${level}级</span>
                <span class="badge badge-priority">${o.priority || 'P?'}</span>
                <span class="badge badge-subsidy">${isPre ? '前补贴' : '后补贴'}</span>
                <span class="badge badge-risk ${risk === '高' ? 'high' : risk === '中' ? 'med' : ''}">风险:${risk}</span>
              </div>
            </div>
            <div class="score-display ${level.toLowerCase()}">
              ${o.score?.toFixed(1) || '?'}<small>分</small>
            </div>
          </div>
          
          <div class="opp-meta">
            <div class="meta-item">
              <span class="label">支持金额</span>
              <span class="value">${subsidy > 0 ? subsidy + '万' : '待定'}</span>
            </div>
            <div class="meta-item">
              <span class="label">申报截止</span>
              <span class="value">${o.deadline || '待定'} (${daysLeft > 0 ? daysLeft + '天' : '已过期'})</span>
            </div>
            <div class="meta-item">
              <span class="label">来源级别</span>
              <span class="value">${o.source_level || o.parsed?.级别 || '未知'}</span>
            </div>
            <div class="meta-item">
              <span class="label">来源</span>
              <span class="value">${o.source || '未知'}</span>
            </div>
            <div class="meta-item">
              <span class="label">ROI</span>
              <span class="value">${roi}</span>
            </div>
            <div class="meta-item">
              <span class="label">匹配度</span>
              <span class="value">${((o.match_score || 0) * 100).toFixed(0)}%</span>
            </div>
          </div>
          
          <div class="opp-details">
            <div class="detail-row">
              <span class="detail-label">支持方向</span>
              <div class="detail-tags">
                ${directions.slice(0, 4).map(d => `<span class="tag-item">${d}</span>`).join('')}
              </div>
            </div>
            ${matched.length > 0 ? `
            <div class="detail-row">
              <span class="detail-label">命中标签</span>
              <div class="detail-tags">
                ${matched.map(t => `<span class="tag-item">${t}</span>`).join('')}
              </div>
            </div>
            ` : ''}
            ${missing.length > 0 ? `
            <div class="detail-row">
              <span class="detail-label">资质缺口</span>
              <div class="detail-tags">
                ${missing.map(t => `<span class="tag-item tag-missing">${t}</span>`).join('')}
              </div>
            </div>
            ` : ''}
            ${o.recommended_project ? `
            <div class="detail-row">
              <span class="detail-label">建议项目</span>
              <span>${o.recommended_project}</span>
            </div>
            ` : ''}
          </div>
          
          <div class="opp-footer">
            <div class="project-name">
              建议项目: <strong>${o.recommended_project || '待定'}</strong>
            </div>
          </div>
        </article>
      `;
    }
    
    // Event Listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.filter = btn.dataset.filter;
        render();
      });
    });
    
    document.getElementById('searchInput').addEventListener('input', e => {
      state.search = e.target.value;
      render();
    });
    
    // Init
    loadData();
  </script>
</body>
</html>
