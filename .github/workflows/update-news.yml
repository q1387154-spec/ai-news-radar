name: Update Policy Intelligence Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update-policy-radar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install feedparser requests

      # ── Phase 1: 政府官网抓取（Jina Reader，无需RSS） ──────────────────
      - name: Fetch government websites (P0-P2)
        run: |
          python scripts/fetch_gov.py \
            --output-dir data \
            --priority all \
            --window-hours 72 \
            --delay 2

      # ── Phase 2: 微信公众号抓取（RSSHub，需要自建实例）───────────────
      # RSSHub 启动（如果 secrets.RSSHUB_URL 提供了地址）
      - name: Start RSSHub (optional)
        if: vars.RSSHUB_URL != ''
        run: |
          echo "RSSHub URL configured: ${{ vars.RSSHUB_URL }}"
          # RSSHub runs externally; scripts/fetch_wx.py will use it

      - name: Fetch WeChat public accounts
        if: vars.RSSHUB_URL != ''
        env:
          RSSHUB_BASE: ${{ vars.RSSHUB_URL }}
        run: |
          python scripts/fetch_wx.py \
            --output-dir data \
            --window-hours 72 \
            --delay 2

      # ── Phase 3: 合并输出 ───────────────────────────────────────────
      - name: Merge and build final output
        run: |
          python scripts/merge.py \
            --output-dir data \
            --window-hours 72

      # ── 保留原有 AI 新闻（作为 AI 技术分类的数据源）────────────────
      - name: Update AI news (fallback for AI tech category)
        if: vars.AI_NEWS_ENABLED == 'true'
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
          RSS_MAX_FEEDS: ${{ vars.RSS_MAX_FEEDS || 10 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
          elif [ -f feeds/follow.example.opml ]; then
            cp feeds/follow.example.opml feeds/follow.opml
          fi
          if [ -f feeds/follow.opml ]; then
            python scripts/update_news.py \
              --output-dir data \
              --window-hours 24 \
              --archive-days 21 \
              --rss-opml feeds/follow.opml \
              --rss-max-feeds "${RSS_MAX_FEEDS:-10}"
          fi

      # ── Commit ────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 提交政策情报数据
          git add data/latest-gov.json \
                  data/latest-wechat.json \
                  data/latest.json \
                  data/source-status-gov.json \
                  data/source-status.json

          # 提交 AI 新闻（如果启用了）
          git add data/latest-24h.json \
                  data/latest-24h-all.json \
                  data/archive.json \
                  data/source-status.json \
                  data/waytoagi-7d.json \
                  data/title-zh-cache.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update policy intelligence snapshot"
          git push
