name: Update Policy Intelligence Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update-policy-radar-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 50
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install feedparser requests

      # ── Phase 1: 政府政策抓取 + 关键词解析 + 评分 ──────────────────────
      - name: Fetch and process government policies
        run: |
          python scripts/run_pipeline.py --test --limit 50 2>&1 | head -30 || true

      # ── Phase 2: 微信公众号抓取（RSSHub，需要自建实例）───────────────
      - name: Fetch WeChat public accounts
        if: vars.RSSHUB_URL != ''
        env:
          RSSHUB_BASE: ${{ vars.RSSHUB_URL }}
        run: |
          python scripts/fetch_wx.py \
            --output-dir data \
            --window-hours 72 \
            --delay 2

      # ── Phase 3: 合并输出 ───────────────────────────────────────────
      - name: Merge and build final output
        run: |
          python scripts/merge.py \
            --output-dir data \
            --window-hours 72

      # ── 保留原有 AI 新闻（作为 AI 技术分类的数据源）────────────────
      - name: Update AI news (fallback for AI tech category)
        if: vars.AI_NEWS_ENABLED == 'true'
        env:
          FOLLOW_OPML_B64: ${{ secrets.FOLLOW_OPML_B64 }}
          RSS_MAX_FEEDS: ${{ vars.RSS_MAX_FEEDS || 10 }}
        run: |
          mkdir -p feeds
          if [ -n "$FOLLOW_OPML_B64" ]; then
            echo "$FOLLOW_OPML_B64" | base64 --decode > feeds/follow.opml
          elif [ -f feeds/follow.example.opml ]; then
            cp feeds/follow.example.opml feeds/follow.opml
          fi
          if [ -f feeds/follow.opml ]; then
            python scripts/update_news.py \
              --output-dir data \
              --window-hours 24 \
              --archive-days 21 \
              --rss-opml feeds/follow.opml \
              --rss-max-feeds "${RSS_MAX_FEEDS:-10}"
          fi

      # ── Commit ────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          set -x
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /github/workspace
          # 列出实际生成的文件
          ls -la data/
          # 逐个添加文件
          git add data/latest-gov.json 2>/dev/null && echo "added latest-gov.json" || echo "latest-gov.json not found"
          git add data/latest.json 2>/dev/null && echo "added latest.json" || echo "latest.json not found"
          git add data/policy-opportunities.json 2>/dev/null && echo "added policy-opportunities.json" || echo "policy-opportunities.json not found"
          git add data/source-status-gov.json 2>/dev/null && echo "added source-status-gov.json" || echo "source-status-gov.json not found"
          git add data/source-status.json 2>/dev/null && echo "added source-status.json" || echo "source-status.json not found"
          # 检查是否有变化
          if ! git diff --cached --quiet; then
            git commit -m "chore: update policy intelligence snapshot" || echo "COMMIT FAILED"
            git push || echo "PUSH FAILED"
          else
            echo "No changes to commit"
          fi
