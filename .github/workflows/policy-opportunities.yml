name: Policy Opportunities - Daily Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"        # 每天 09:00 UTC = 17:00 北京时间
    - cron: "0 14 * * *"       # 每天 14:00 UTC = 22:00 北京时间

concurrency:
  group: policy-opportunities-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ═══════════════════════════════════════════════════════════
  # Job 1: 静态抓取（GitHub 数据层）
  # 优先级：requests > bs4 > Firecrawl > browser
  # ═══════════════════════════════════════════════════════════
  fetch:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests beautifulsoup4 lxml pandas

      # ── Step 1: 政府 HTML 页面（requests+bs4，主力） ─────────────
      # 注：gov.opml 中的 RSS 大量无效（XML 解析失败），改用 HTML 直抓更可靠
      - name: Fetch government HTML pages (static, no RSS)
        run: |
          python scripts/fetch_gov_static.py \
            --output-dir data \
            --limit 150 2>&1

      # ── Step 2: 微信公众号（搜狗免费搜索 + Jina Reader免费tier） ─
      - name: Fetch WeChat articles (free)
        run: |
          python scripts/fetch_wechat_free.py \
            --output-dir data \
            --window-hours 72 2>&1

      # ── Step 3: 合并所有数据 ───────────────────────────────
      - name: Merge all fetched data
        run: |
          python scripts/merge_raw.py \
            --output-dir data 2>&1

      # ── Step 4: Commit 数据文件 ───────────────────────────
      - name: Commit raw data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /github/workspace

          ls -la data/

          # 只提交数据文件
          git add data/latest-gov.json data/gov-pages.json data/wechat.json data/merged.json 2>/dev/null || true
          git add data/*.json 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: update policy data $(date +%Y-%m-%dT%H:%M)"
            git push
          else
            echo "No data changes to commit"
          fi

  # ═══════════════════════════════════════════════════════════
  # Job 2: OpenClaw AI 分析层（单独的 job，方便独立重跑）
  # 触发条件：fetch job 完成或 schedule
  # ═══════════════════════════════════════════════════════════
  analyze:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: fetch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4 lxml pandas

      # ── 分析政策机会（纯本地计算，无需 AI） ───────────────
      - name: Analyze policy opportunities
        run: |
          python scripts/analyze_opportunities.py \
            --input data/merged.json \
            --output data/policy-opportunities.json 2>&1

      # ── 生成前端页面 ─────────────────────────────────────
      - name: Build static pages
        run: |
          python scripts/build_pages.py \
            --input data/policy-opportunities.json \
            --output index.html 2>&1

      # ── Commit 机会文件和页面 ────────────────────────────
      - name: Commit results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory /github/workspace

          git add data/policy-opportunities.json index.html 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: update policy opportunities $(date +%Y-%m-%dT%H:%M)"
            git push
          else
            echo "No opportunity changes to commit"
          fi

      - name: Trigger GitHub Pages rebuild
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/pages/builds -X POST || true
