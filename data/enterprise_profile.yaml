# 企业画像 - 上海中通吉网络技术有限公司
enterprise:
  name: 上海中通吉网络技术有限公司
  industry: 物流 / 快递 / 供应链
  region: 上海 / 青浦 / 长三角
  scale: 大型（员工数万人，网点覆盖全国）
  
  # 已有资质
  certifications:
    - 科技型中小企业（已认定）
    - 高新技术企业（待确认，是否在有效期内）
  
  # 重点业务方向
  focus_areas:
    - 智慧物流数字化转型
    - 无人机配送试点
    - AI调度系统
    - 低空经济（eVTOL/无人机物流）
    - 自动驾驶货车
  
  # 申报偏好（红线）
  preferences:
    avoid:
      - 垫资类政策（公司规定不垫资）
      - 陪跑类政策（无实质收益）
      - 验收条件不明确的项目
      - 需要先投入大量自有资金再报销的模式
    
    prefer:
      - 先补后类（补贴先行，企业后投入）
      - 验收标准清晰、量化
      - 金额明确、到账快的政策
      - 与公司重点业务高度匹配
  
  # 财务特征
  financials:
    - 研发费用：有一定研发投入
    - 营收规模：大型企业标准
    - 员工人数：快递员为主，人数众多（稳岗补贴相关）

# 六大赛道关键词
# 用于搜索和匹配
keywords:
  high_priority:
    - 低空经济
    - eVTOL
    - 无人机物流
    - 无人配送
    - 智慧物流
    - 物流大模型
    - AI调度
    - 数字孪生
    - 超长期国债
    - 两重两新
    - 设备更新
    - 技改
    - 快递
    - 物流
  
  medium_priority:
    - 专精特新
    - 小巨人
    - 高企
    - 研发费用加计扣除
    - 数字化转型
    - 数据要素
  
  human_resources:
    - 稳岗返还
    - 技能补贴
    - 培训
    - 就业见习
    - 职业技能
    - 快递员
  
  job_related:
    - 国企招聘
    - 社招
    - 遴选
    - 事业单位
    - 交通系统

# 评分权重
scoring_weights:
  industry_relevance: 0.25    # 行业相关性
  regional_relevance: 0.15   # 地域匹配
  track_relevance: 0.20      # 赛道匹配  
  certification_match: 0.15   # 资质匹配
  time_urgency: 0.15        # 时间紧迫度
  funding_clarity: 0.10      # 资金明确度
